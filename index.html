<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>吗喽精神状态测试</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:PingFang SC,Microsoft YaHei,sans-serif;background:linear-gradient(45deg,#ffecd2,#fcb69f,#c9f7ff,#c1c1f7);min-height:100vh;padding:12px}.box{max-width:620px;margin:20px auto;background:rgba(255,255,255,.92);border-radius:24px;box-shadow:0 12px 32px rgba(0,0,0,.1);padding:26px;backdrop-filter:blur(4px)}h1{text-align:center;color:#ff6b9d;font-size:24px;margin-bottom:8px}.tip{text-align:center;color:#888;font-size:14px;margin-bottom:24px}.q{font-size:15px;color:#444;margin:14px 0 10px;line-height:1.5}.opts{display:flex;gap:10px;margin-bottom:18px}.opts button{flex:1;padding:11px 6px;border:none;border-radius:14px;background:#f6f7ff;color:#666;font-size:14px;transition:.3s}.opts button.active{background:linear-gradient(90deg,#ff6b9d,#c44569);color:#fff;box-shadow:0 4px 12px rgba(255,107,157,.3)}#submit{width:100%;padding:17px;border:none;border-radius:18px;background:linear-gradient(90deg,#63a4ff,#7b7fff);color:#fff;font-size:17px;font-weight:500;margin:20px 0;box-shadow:0 6px 20px rgba(99,164,255,.25)}.result{display:none;background:linear-gradient(135deg,#fff5fb,#f7f2ff);padding:24px;border-radius:20px;margin-top:20px}.result h3{color:#7b7fff;margin-bottom:12px}.result p{color:#555;line-height:1.8}</style></head><body><div class="box"><h1>🐒 吗喽SBTI精神状态测试</h1><p class="tip">A完全是我｜B大概率是｜C偶尔才会｜D完全不是</p><div id="qs"></div><button id="submit">🚀 立刻测我是什么喽</button><div class="result" id="res"><h3 id="score"></h3><p id="text"></p></div></div><script>const qs=[{q:"看到内卷只想原地化身吗喽躺平"},{q:"表面平静内心疯狂发疯吐槽"},{q:"上班带娃再累只想摆烂不动"},{q:"社交能躲就躲假装合群超累"},{q:"睡前无效熬夜刷手机到深夜"},{q:"遇到麻烦第一反应算了无所谓"},{q:"突然emo下一秒又摆烂想通"},{q:"别人劝我努力只想说吗喽"},{q:"能坐不站能躺绝不坐着"},{q:"表面积极内心全是吗喽绝望"},{q:"不想讨好任何人自己舒服最重要"},{q:"热血三分钟后继续摆烂"},{q:"人群格格不入只想躲起来当吗喽"},{q:"对啥都没兴趣主打无欲无求"},{q:"被骂也无所谓精神胜利法"},{q:"计划赶不上变化干脆不计划"},{q:"羡慕稳定人自己只想发疯"},{q:"天塌下来也要先躺平再说"},{q:"别人卷生卷死我在吗喽发呆"},{q:"人生宗旨怎么舒服怎么来"}];const el=document.getElementById("qs");let ans=[];qs.forEach((e,i)=>{const d=document.createElement("div");d.innerHTML=`<div class="q">${i+1}. ${e.q}</div><div class="opts"><button data-i="${i}" data-v="4">A</button><button data-i="${i}" data-v="3">B</button><button data-i="${i}" data-v="2">C</button><button data-i="${i}" data-v="1">D</button></div>`;el.appendChild(d)});document.querySelectorAll(".opts button").forEach(b=>{b.addEventListener("click",()=>{const i=+b.dataset.i;ans[i]=+b.dataset.v;b.parentElement.querySelectorAll("button").forEach(x=>x.classList.remove("active"));b.classList.add("active")})});document.getElementById("submit").onclick=()=>{if(ans.length<20||ans.some(x=>!x))return alert("请完成所有题目哦");const s=ans.reduce((a,b)=>a+b,0);const r=document.getElementById("res");const sc=document.getElementById("score");const tx=document.getElementById("text");sc.textContent=`总分：${s}分`;let t;if(s>=66)t="【🐒 吗喽本喽】纯野生吗喽！内卷免疫、奋斗过敏，人生主打躺平摆烂。别人卷生卷死，你只管发呆摸鱼，当代清醒天花板！";else if(s>=51)t="【😌 清醒摆烂王】理智型吗喽，偶尔努力很快放弃。看透世事懒得争抢，能躺不卷，会摸鱼会享受，精神状态好到飞起！";else if(s>=36)t="【😜 间歇性发疯人】情绪波动型吗喽，上一秒摆烂下一秒发疯。一半清醒一半疯癫，最真实的当代年轻人！";else t="【💪 情绪稳定特种兵】反吗喽体质！内核超强不内耗，做事有干劲，再乱的生活也能稳住，妥妥人生强者！";tx.textContent=t;r.style.display="block"};</script></body></html>
